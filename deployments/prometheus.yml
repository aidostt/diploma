global:
  scrape_interval: 15s

scrape_configs:
  # The gateway serves its metrics on the HTTP port.
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['api-gateway:8000']

  # Each gRPC service serves its metrics on the dedicated METRICS_PORT (9464).
  - job_name: services
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'authentication-service:9464'
          - 'notification-service:9464'
          - 'qrcode-service:9464'
          - 'reservation-service:9464'
