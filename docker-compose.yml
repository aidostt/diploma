version: '3.8'
services:
  api-gateway:
    build:
      context: ./main-api-gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - authentication-service
      - notification-service
      - qrcode-service
      - reservation-service
    env_file:
      - ./main-api-gateway/.env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317

  authentication-service:
    build:
      context: ./authentication-service
      dockerfile: Dockerfile
    env_file:
      - ./authentication-service/.env
    depends_on:
      - postgres
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    env_file:
      - ./notification-service/.env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317

  qrcode-service:
    build:
      context: ./qrcode-service
      dockerfile: Dockerfile
    env_file:
      - ./qrcode-service/.env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317

  reservation-service:
    build:
      context: ./reservation-service
      dockerfile: Dockerfile
    env_file:
      - ./reservation-service/.env
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Observability stack. Traces flow to Jaeger over OTLP; Prometheus scrapes the
  # services' /metrics endpoints. Both are inert for the app unless
  # OTEL_EXPORTER_OTLP_ENDPOINT is set (it is, above).
  jaeger:
    image: jaegertracing/all-in-one:1.54
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # web UI
      - "4317:4317"   # OTLP gRPC

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
